services:
  mysql:
    image: mysql:8.4
    container_name: edgepulse-mysql
    environment:
      MYSQL_DATABASE: edgepulse
      MYSQL_USER: edgepulse
      MYSQL_PASSWORD: edgepulse
      MYSQL_ROOT_PASSWORD: edgepulse-root
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: edgepulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: edgepulse-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data

  backend:
    build:
      context: ./backend
    container_name: edgepulse-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      mqtt:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: edgepulse-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:80"

  edge-simulator:
    build:
      context: ./edge-simulator
    container_name: edgepulse-edge-simulator
    depends_on:
      mqtt:
        condition: service_started
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      DEVICE_COUNT: 3
      INTERVAL_SECONDS: 5

volumes:
  mysql-data:
  redis-data:
  mosquitto-data:
